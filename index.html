<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="index, follow" />
  <title>Athena</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-MW9Z4L9WTY"></script>

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Cormorant+Garamond:wght@600&display=swap");

    :root {
      --bg: #000000;
      --bg-soft: #080808;
      --panel: rgba(255, 255, 255, 0.035);
      --panel-strong: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.12);
      --border-soft: rgba(255, 255, 255, 0.07);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.62);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    @keyframes haloDrift {
      0% { transform: translate3d(0, 0, 0) scale(1); opacity: 0.2; }
      50% { transform: translate3d(1.5rem, -1rem, 0) scale(1.06); opacity: 0.34; }
      100% { transform: translate3d(0, 0, 0) scale(1); opacity: 0.2; }
    }

    @keyframes frameFloat {
      0% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0); }
    }

    @keyframes breatheWordmark {
      0% { transform: scale(1); opacity: 0.95; }
      50% { transform: scale(1.022); opacity: 1; }
      100% { transform: scale(1); opacity: 0.95; }
    }

    @keyframes riseIn {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 18% 22%, rgba(255, 255, 255, 0.07), transparent 22%),
        radial-gradient(circle at 82% 78%, rgba(255, 255, 255, 0.06), transparent 22%),
        linear-gradient(180deg, var(--bg-soft) 0%, var(--bg) 45%, #050505 100%);
      color: var(--text);
      font-family: "Manrope", "Segoe UI", sans-serif;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      pointer-events: none;
      border-radius: 50%;
      filter: blur(20px);
      animation: haloDrift 14s ease-in-out infinite;
    }

    body::before {
      top: 8vh;
      left: -6vw;
      width: min(28rem, 42vw);
      height: min(28rem, 42vw);
      background: radial-gradient(circle, rgba(255, 255, 255, 0.12), transparent 66%);
    }

    body::after {
      right: -8vw;
      bottom: 0;
      width: min(32rem, 48vw);
      height: min(32rem, 48vw);
      background: radial-gradient(circle, rgba(255, 255, 255, 0.09), transparent 68%);
      animation-delay: -7s;
    }

    .page {
      position: relative;
      min-height: 100vh;
      padding: clamp(1rem, 2vw, 2rem);
      display: grid;
      place-items: center;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
      background-size: 72px 72px;
      mask-image: radial-gradient(circle at center, black 28%, transparent 80%);
      opacity: 0.22;
      pointer-events: none;
    }

    main {
      position: relative;
      z-index: 1;
      width: min(100%, 56rem);
      padding: clamp(1.2rem, 2vw, 2rem);
      border: 1px solid var(--border-soft);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.025), rgba(255, 255, 255, 0.01)),
        rgba(5, 5, 5, 0.82);
      box-shadow: 0 26px 120px rgba(0, 0, 0, 0.55);
      animation: riseIn 0.85s ease-out both, frameFloat 8s ease-in-out 1.2s infinite;
      overflow: hidden;
    }

    main::before {
      content: "";
      position: absolute;
      inset: 0.9rem;
      border: 1px solid var(--border-soft);
      pointer-events: none;
    }

    .stack {
      position: relative;
      z-index: 1;
      display: grid;
      gap: clamp(2rem, 5vw, 4rem);
      padding: clamp(1rem, 2vw, 2rem);
    }

    .hero {
      display: grid;
      gap: 1rem;
      animation: riseIn 0.9s ease-out 0.08s both;
    }

    .eyebrow {
      color: var(--muted);
      font-size: 0.74rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }

    h1 {
      width: fit-content;
      max-width: 100%;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(4rem, 14vw, 8rem);
      line-height: 0.88;
      font-weight: 600;
      letter-spacing: -0.05em;
      transform-origin: left center;
      animation: breatheWordmark 6s ease-in-out 1s infinite;
    }

    .slogan {
      max-width: 22rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: clamp(1rem, 1.8vw, 1.08rem);
      line-height: 1.55;
    }

    .intro-copy {
      max-width: 38rem;
      color: var(--text);
      font-size: clamp(1.05rem, 2vw, 1.28rem);
      line-height: 1.6;
    }

    .contact {
      display: grid;
      gap: 0;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, var(--panel-strong), var(--panel));
      animation: riseIn 0.9s ease-out 0.2s both;
    }

    .contact-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border-soft);
      color: var(--muted);
      font-size: 0.74rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    .contact-row {
      display: grid;
      grid-template-columns: minmax(6rem, 7.5rem) minmax(0, 1fr);
      gap: 1rem;
      align-items: center;
      padding: 1rem 1.25rem;
      border-top: 1px solid var(--border-soft);
      transition: background-color 0.25s ease, transform 0.25s ease;
    }

    .contact-row:first-of-type {
      border-top: 0;
    }

    .contact-row:hover {
      background: rgba(255, 255, 255, 0.025);
      transform: translateX(4px);
    }

    dt {
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    dd,
    dd a {
      min-width: 0;
      color: var(--text);
      font-size: clamp(1rem, 1.8vw, 1.22rem);
      line-height: 1.35;
      text-decoration: none;
      word-break: break-word;
    }

    .contact-link {
      display: inline-flex;
      align-items: center;
      gap: 0.7rem;
    }

    .contact-icon {
      width: 1rem;
      height: 1rem;
      flex: 0 0 auto;
      opacity: 0.72;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    a {
      transition: opacity 0.2s ease;
    }

    a:hover,
    a:focus-visible {
      opacity: 0.72;
    }

    @media (max-width: 720px) {
      .page {
        place-items: stretch;
      }

      main {
        width: 100%;
        min-height: calc(100vh - 2rem);
      }

      .stack {
        gap: 2rem;
        padding: 0.8rem;
      }

      h1 {
        font-size: clamp(3.3rem, 20vw, 5.4rem);
      }

      .slogan {
        max-width: none;
      }

      .contact-row {
        grid-template-columns: 1fr;
        gap: 0.35rem;
      }
    }

    @media (max-width: 480px) {
      body::before {
        top: 4vh;
        left: -5rem;
        width: 14rem;
        height: 14rem;
      }

      body::after {
        right: -5rem;
        width: 16rem;
        height: 16rem;
      }

      main::before {
        inset: 0.6rem;
      }

      .contact-header,
      .contact-row {
        padding-left: 1rem;
        padding-right: 1rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
