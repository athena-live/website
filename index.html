<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="index, follow" />
  <title>Athena</title>
  <style>
    :root {
      --bg: #f5f3ed;
      --panel: rgba(255, 255, 255, 0.78);
      --border: rgba(24, 32, 36, 0.12);
      --text: #182024;
      --muted: #5c666c;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      background:
        radial-gradient(circle at top left, rgba(210, 219, 209, 0.8), transparent 34%),
        radial-gradient(circle at bottom right, rgba(231, 223, 201, 0.85), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }

    main {
      width: min(100%, 34rem);
      padding: 2.5rem;
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      background: var(--panel);
      backdrop-filter: blur(10px);
      box-shadow: 0 24px 80px rgba(24, 32, 36, 0.08);
    }

    h1 {
      font-size: clamp(2.3rem, 8vw, 4.5rem);
      font-weight: 600;
      letter-spacing: -0.04em;
      margin-bottom: 0.6rem;
    }

    p {
      color: var(--muted);
      margin-bottom: 2rem;
      font-size: 1rem;
    }

    dl {
      display: grid;
      gap: 1.1rem;
    }

    dt {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.18rem;
    }

    dd {
      font-size: 1.15rem;
      line-height: 1.4;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    a:hover,
    a:focus-visible {
      text-decoration: underline;
      text-underline-offset: 0.18em;
    }

    @media (max-width: 640px) {
      body {
        padding: 1rem;
      }

      main {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Athena</h1>
    <p>Contact</p>
    <dl>
      <div>
        <dt>Email</dt>
        <dd><a href="mailto:info@athena.live">info@athena.live</a></dd>
      </div>
      <div>
        <dt>Phone</dt>
        <dd><a href="tel:+15708925483">1 (570) 892-5483</a></dd>
      </div>
      <div>
        <dt>X</dt>
        <dd><a href="https://x.com/_athenalive">@_athenalive</a></dd>
      </div>
    </dl>
  </main>
</body>
</html>
