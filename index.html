<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="index, follow" />
  <title>Athena</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-MW9Z4L9WTY"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() {
      dataLayer.push(arguments);
    }
    gtag("js", new Date());
    gtag("config", "G-MW9Z4L9WTY");
  </script>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Cormorant+Garamond:wght@600&display=swap");

    :root {
      --bg: #000000;
      --bg-soft: #080808;
      --panel: rgba(255, 255, 255, 0.035);
      --panel-strong: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.12);
      --border-soft: rgba(255, 255, 255, 0.07);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.62);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    @keyframes haloDrift {
      0% { transform: translate3d(0, 0, 0) scale(1); opacity: 0.2; }
      50% { transform: translate3d(1.5rem, -1rem, 0) scale(1.06); opacity: 0.34; }
      100% { transform: translate3d(0, 0, 0) scale(1); opacity: 0.2; }
    }

    @keyframes frameFloat {
      0% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0); }
    }

    @keyframes breatheWordmark {
      0% { transform: scale(1); opacity: 0.95; }
      50% { transform: scale(1.022); opacity: 1; }
      100% { transform: scale(1); opacity: 0.95; }
    }

    @keyframes riseIn {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 18% 22%, rgba(255, 255, 255, 0.07), transparent 22%),
        radial-gradient(circle at 82% 78%, rgba(255, 255, 255, 0.06), transparent 22%),
        linear-gradient(180deg, var(--bg-soft) 0%, var(--bg) 45%, #050505 100%);
      color: var(--text);
      font-family: "Manrope", "Segoe UI", sans-serif;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      pointer-events: none;
      border-radius: 50%;
      filter: blur(20px);
      animation: haloDrift 14s ease-in-out infinite;
    }

    body::before {
      top: 8vh;
      left: -6vw;
      width: min(28rem, 42vw);
      height: min(28rem, 42vw);
      background: radial-gradient(circle, rgba(255, 255, 255, 0.12), transparent 66%);
    }

    body::after {
      right: -8vw;
      bottom: 0;
      width: min(32rem, 48vw);
      height: min(32rem, 48vw);
      background: radial-gradient(circle, rgba(255, 255, 255, 0.09), transparent 68%);
      animation-delay: -7s;
    }

    .page {
      position: relative;
      min-height: 100vh;
      padding: clamp(1rem, 2vw, 2rem);
      display: grid;
      place-items: center;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
      background-size: 72px 72px;
      mask-image: radial-gradient(circle at center, black 28%, transparent 80%);
      opacity: 0.22;
      pointer-events: none;
    }

    main {
      position: relative;
      z-index: 1;
      width: min(100%, 56rem);
      padding: clamp(1.2rem, 2vw, 2rem);
      border: 1px solid var(--border-soft);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.025), rgba(255, 255, 255, 0.01)),
        rgba(5, 5, 5, 0.82);
      box-shadow: 0 26px 120px rgba(0, 0, 0, 0.55);
      animation: riseIn 0.85s ease-out both, frameFloat 8s ease-in-out 1.2s infinite;
      overflow: hidden;
    }

    main::before {
      content: "";
      position: absolute;
      inset: 0.9rem;
      border: 1px solid var(--border-soft);
      pointer-events: none;
    }

    .stack {
      position: relative;
      z-index: 1;
      display: grid;
      gap: clamp(2rem, 5vw, 4rem);
      padding: clamp(1rem, 2vw, 2rem);
    }

    .hero {
      display: grid;
      gap: 1.15rem;
      animation: riseIn 0.9s ease-out 0.08s both;
    }

    .eyebrow {
      color: var(--muted);
      font-size: 0.74rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }

    h1 {
      width: fit-content;
      max-width: 100%;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(4rem, 14vw, 8rem);
      line-height: 0.88;
      font-weight: 600;
      letter-spacing: -0.05em;
      transform-origin: left center;
      animation: breatheWordmark 6s ease-in-out 1s infinite;
    }

    .slogan {
      max-width: 32rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      color: var(--text);
      font-size: clamp(1.35rem, 3vw, 2.2rem);
      line-height: 1.15;
      font-weight: 700;
    }

    .statement {
      display: grid;
      gap: 0.45rem;
      max-width: 42rem;
    }

    .statement-title {
      font-family: "Cormorant Garamond", Georgia, serif;
      color: var(--text);
      font-size: clamp(3rem, 8vw, 5.4rem);
      line-height: 0.92;
      font-weight: 600;
    }

    .statement-subtitle {
      max-width: 38rem;
      color: var(--text);
      font-size: clamp(1.25rem, 2.8vw, 2rem);
      line-height: 1.18;
      font-weight: 700;
    }

    .statement-copy {
      max-width: 42rem;
      color: var(--muted);
      font-size: clamp(1rem, 1.7vw, 1.18rem);
      line-height: 1.6;
    }

    .connect {
      display: grid;
      gap: 1rem;
      padding-top: clamp(1rem, 2vw, 1.4rem);
      border-top: 1px solid var(--border-soft);
      animation: riseIn 0.9s ease-out 0.2s both;
    }

    .connect-title {
      color: var(--muted);
      font-size: 0.74rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    .connect-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem 1.2rem;
      align-items: center;
    }

    .connect-link {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      color: var(--text);
      font-size: clamp(0.95rem, 1.5vw, 1.05rem);
      line-height: 1.35;
      text-decoration: none;
      word-break: break-word;
    }

    .connect-icon {
      width: 1rem;
      height: 1rem;
      flex: 0 0 auto;
      opacity: 0.72;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    a {
      transition: opacity 0.2s ease;
    }

    a:hover,
    a:focus-visible {
      opacity: 0.72;
    }

    @media (max-width: 720px) {
      .page {
        place-items: stretch;
      }

      main {
        width: 100%;
        min-height: calc(100vh - 2rem);
      }

      .stack {
        gap: 2rem;
        padding: 0.8rem;
      }

      h1 {
        font-size: clamp(3.3rem, 20vw, 5.4rem);
      }

      .slogan {
        max-width: none;
      }

      .connect-list {
        display: grid;
        align-items: start;
      }
    }

    @media (max-width: 480px) {
      body::before {
        top: 4vh;
        left: -5rem;
        width: 14rem;
        height: 14rem;
      }

      body::after {
        right: -5rem;
        width: 16rem;
        height: 16rem;
      }

      main::before {
        inset: 0.6rem;
      }

    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <main>
      <div class="stack">
        <section class="hero" aria-label="Athena introduction">
          <p class="eyebrow">Athena</p>
          <h1>Athena</h1>
          <p class="slogan">Intelligence in action</p>
          <div class="statement">
            <p class="statement-title">We</p>
            <p class="statement-subtitle">design and deploy information technology solutions</p>
            <p class="statement-copy">that automate operations and scale organizations.</p>
          </div>
        </section>

        <section class="connect" aria-label="Connect with Athena">
          <p class="connect-title">Connect</p>
          <div class="connect-list">
            <a class="connect-link" href="mailto:info@athena.live">
              <svg class="connect-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 6h16v12H4z" />
                <path d="m4 7 8 6 8-6" />
              </svg>
              <span>info@athena.live</span>
            </a>
            <a class="connect-link" href="tel:+15708925483">
              <svg class="connect-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7l.5 3a2 2 0 0 1-.6 1.8l-1.3 1.3a16 16 0 0 0 6.4 6.4l1.3-1.3a2 2 0 0 1 1.8-.6l3 .5A2 2 0 0 1 22 16.9z" />
              </svg>
              <span>1 (570) 892-5483</span>
            </a>
            <a class="connect-link" href="https://x.com/_athenalive">
              <svg class="connect-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 4 20 20" />
                <path d="M20 4 4 20" />
              </svg>
              <span>@_athenalive</span>
            </a>
          </div>
        </section>
      </div>
    </main>
  </div>
</body>
</html>
